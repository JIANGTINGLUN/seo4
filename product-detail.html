<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品詳情 - ELYSIAN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            padding: 150px 5% 50px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .detail-img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid var(--glass-border);
        }
        .detail-info h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .detail-info .price {
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }
        .detail-info .description {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 2;
        }
        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; gap: 2rem; }
            .detail-img { height: 400px; }
        }
    </style>
</head>
<body id="product-detail-page">
    <nav>
        <a href="index.html" class="logo">ELYSIAN</a>
        <ul class="nav-links">
            <li><a href="index.html">首頁</a></li>
            <li><a href="about.html">關於品牌</a></li>
            <li><a href="casual.html">休閒服飾</a></li>
            <li><a href="formal.html">正式服飾</a></li>
            <li><a href="jewelry.html">珠寶飾品</a></li>
            <li><a href="accessories.html">精緻配件</a></li>
            <li><a href="others.html">其它類</a></li>
            <li><a href="contact.html">聯絡我們</a></li>
        </ul>
    </nav>

    <main class="detail-container">
        <img id="product-image" src="" alt="" class="detail-img">
        <div class="detail-info">
            <h1 id="product-name">載入中...</h1>
            <p id="product-price" class="price"></p>
            <p id="product-description" class="description"></p>
            <button class="btn-primary">加入購物籃</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ELYSIAN Luxury. All Rights Reserved.</p>
    </footer>

    <script src="products.js"></script>
    <script src="main.js"></script>
</body>
</html>
